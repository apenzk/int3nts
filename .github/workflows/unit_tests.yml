name: "Unit Tests"
on:
  pull_request:
  push:
    branches:
      - main
      - real-main

jobs:
  mvm:
    uses: ./.github/workflows/unit-tests-reusable.yml
    with:
      script: "./intent-frameworks/mvm/scripts/test.sh"

  evm:
    uses: ./.github/workflows/unit-tests-reusable.yml
    with:
      script: "cd intent-frameworks/evm && npm install && npm test"

  svm:
    uses: ./.github/workflows/unit-tests-reusable.yml
    with:
      script: "cd intent-frameworks/svm && ./scripts/test.sh"

  chain-clients:
    uses: ./.github/workflows/unit-tests-reusable.yml
    with:
      script: "./chain-clients/scripts/test.sh"

  solver:
    uses: ./.github/workflows/unit-tests-reusable.yml
    with:
      script: "cd solver && cargo test"

  coordinator:
    uses: ./.github/workflows/unit-tests-reusable.yml
    with:
      script: "cd coordinator && cargo test"

  integrated-gmp:
    uses: ./.github/workflows/unit-tests-reusable.yml
    with:
      script: "cd integrated-gmp && cargo test"

  frontend:
    uses: ./.github/workflows/unit-tests-reusable.yml
    with:
      script: "cd frontend && npm install --legacy-peer-deps && npm test"

